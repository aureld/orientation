# Load secrets from .env.docker (not the dev .env).
# Copy .env.example → .env.docker and fill in real values.
env_file:
  - path: .env.docker
    required: false

services:
  db:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_USER: orientation
      POSTGRES_PASSWORD: orientation
      POSTGRES_DB: orientation
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orientation"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://orientation:orientation@db:5432/orientation?schema=public
      AUTH_SECRET: "${AUTH_SECRET:?Set AUTH_SECRET in your environment (use openssl rand -base64 32)}"
      AUTH_URL: ${AUTH_URL:-http://localhost:3000}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
